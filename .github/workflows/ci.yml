name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy rustfmt

      - name: Use Rust 1.96.0
        run: rustup default 1.96.0

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check:all

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build unsigned universal macOS artifacts
        run: npm run tauri:build:macos

      - name: Verify macOS artifacts
        run: npm run package:verify

      - name: Read release version
        id: release_version
        run: |
          version="$(node -p 'require("./crates/c4lens-tauri/tauri.conf.json").version')"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: c4lens-${{ steps.release_version.outputs.version }}-macos-universal-${{ github.sha }}
          path: target/universal-apple-darwin/release/bundle/**/*
          if-no-files-found: error
          retention-days: 14
